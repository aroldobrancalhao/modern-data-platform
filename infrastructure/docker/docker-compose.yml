services:

  postgres:
    image: postgres:17

    container_name: mdp-postgres

    restart: unless-stopped

    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=10
      - -c
      - max_wal_senders=10

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "${POSTGRES_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
      - ./postgres/migrations:/migrations

    healthcheck:
      test: ["CMD-SHELL","pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - mdp-network

  kafka:

    image: confluentinc/cp-kafka:7.8.0

    container_name: mdp-kafka

    hostname: kafka

    restart: unless-stopped

    ports:
      - "9092:9092"

    environment:

      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093

      KAFKA_LISTENERS: PLAINTEXT://:29092,HOST://:9092,CONTROLLER://:29093

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,HOST://localhost:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT,CONTROLLER:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

    volumes:
      - kafka_data:/var/lib/kafka/data

    networks:
      - mdp-network

  kafka-ui:

    image: provectuslabs/kafka-ui:latest

    container_name: mdp-kafka-ui

    restart: unless-stopped

    depends_on:
      - kafka

    ports:
      - "${KAFKA_UI_PORT}:8080"

    environment:

      KAFKA_CLUSTERS_0_NAME: Modern Data Platform

      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

    networks:
      - mdp-network

  debezium-connect:

    build:
      context: ./debezium

    container_name: mdp-debezium-connect

    restart: unless-stopped

    depends_on:

      postgres:
        condition: service_healthy

      kafka:
        condition: service_started

    ports:
      - "${DEBEZIUM_PORT}:8083"

    environment:

      BOOTSTRAP_SERVERS: kafka:29092

      GROUP_ID: 1

      CONFIG_STORAGE_TOPIC: connect_configs

      OFFSET_STORAGE_TOPIC: connect_offsets

      STATUS_STORAGE_TOPIC: connect_statuses

      CONFIG_STORAGE_REPLICATION_FACTOR: 1

      OFFSET_STORAGE_REPLICATION_FACTOR: 1

      STATUS_STORAGE_REPLICATION_FACTOR: 1

      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter

      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter

      KEY_CONVERTER_SCHEMAS_ENABLE: "false"

      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"

      PLUGIN_PATH: /kafka/connect/plugins

    networks:
      - mdp-network

networks:

  mdp-network:

    driver: bridge

volumes:

  postgres_data:

  kafka_data: