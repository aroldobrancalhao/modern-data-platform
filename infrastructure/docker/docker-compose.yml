services:
  postgres:
    image: postgres:17

    container_name: mdp-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: mdp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
      - ./postgres/migrations:/migrations

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mdp"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: